dataset: toys  # Dataset name: toys, beauty, steam, ml-1m
log_file: logs/  # log dir path
random_seed: 2025  # Random seed
max_len: 50 # The max length of sequence
device: cuda:0  # Device selection: 'cpu', 'cuda:0', 'cuda:1'
batch_size: 512  # Batch Size
hidden_size: 128  # hidden size of model
dif_blocks: 2  # Number of denoiser blocks
dropout: 0.1  # Dropout of representation
emb_dropout: 0.3  # Dropout of item embedding
hidden_act: gelu  # Activation function: gelu or relu
epochs: 500 # Number of epochs for training
decay_step: 100  # Decay step for StepLR
gamma: 0.1  # Gamma for StepLR
metric_ks:
  - 5
  - 10
  - 20  # ks for Metric@k
optimizer: Adam  # Optimizer choice: 'SGD' or 'Adam'
lr: 0.001  # Learning rate
weight_decay: 0.00001  # L2 regularization
momentum: null  # SGD momentum (None if not used)
schedule_sampler_name: uniform  # Diffusion for t generation
diffusion_steps: 32  # Diffusion step

lambda_uncertainty: 0.001  # uncertainty weight
rescale_timesteps: true  # Rescale timesteps
eval_interval: 5  # The number of epoch to eval
epoch_wo_val: 0  # The number of epoch without eval
patience: 4  # The number of epoch to wait before early stop

diversity_measure: false  # Measure the diversity of recommendation results
epoch_time_avg: false  # Calculate the average time of one epoch training
# Choose denoised decoder:
# 'att', 'mlp', 'mamba',
# 'mamba_tcond', 'mamba_tcond_ssm',
# 'mamba_tcond_ffn', 'mamba_tcond_input',
# 'spc_mamba_nogate', 'spc_mamba',
# 'mamba_adaln_only', 'mamba_tcond_input_adaln',
# 'mamba_tcond_input_adaln_localattn_last', 'mamba_tcond_input_adaln_localattn_all',
# 'mamba_tcond_input_adaln_stage_route_m', 'mamba_tcond_input_adaln_stage_route_f',
# 'mamba_tcond_input_adaln_stage_route_both',
# 'mamba_tcond_input_adaln_ffn_stage_adapter', 'mamba_tcond_input_adaln_ffn_tsm_adapter',
# 'mamba_tcond_input_adaln_ffn_tsm_adapter_noglobal',
# 'mamba_tcond_input_adaln_item_consistency_all', 'mamba_tcond_input_adaln_item_consistency_snr',
# 'mamba_tcond_input_adaln_stationary_latent_all', 'mamba_tcond_input_adaln_stationary_latent_snr'
dif_decoder: att
mamba_d_state: 16
mamba_d_conv: 4
mamba_expand: 2
tcond_gate_alpha_max: 0.1
local_attn_window: 5
local_attn_heads: 2
local_attn_dim: 64
route_num_stages: 4
route_shared_ratio: 0.5
route_extra_ratio_low: 0.125
route_extra_ratio_high: 0.375
ffn_adapter_num_stages: 4
ffn_adapter_ctx_num_stages: 2
ffn_adapter_bottleneck_ratio: 0.25
lambda_item: 0.2
item_alignment_mode: ce
item_alignment_temperature: 0.07
item_alignment_topk: 50
item_alignment_kd_temperature: 1.0
item_alignment_teacher_source: main_ce_head
item_alignment_margin: 0.10
item_alignment_num_negatives: 32
item_alignment_negative_source: inbatch_then_random
item_consistency_temperature: 0.07
item_consistency_snr_power: 1.0
item_consistency_chunk_size: 2048
item_consistency_warmup_epochs: 0
item_consistency_ramp_epochs: 0
item_consistency_max_weight: 0.2
stationary_anchor_scale: 0.24
stationary_anchor_max_scale: 0.24
stationary_shift_norm_cap: 0.5
prediction_target_mode: item_emb
pref_teacher_topk: 20
pref_teacher_temperature: 1.0
pref_mix_topk_alpha: 0.30
pref_mix_stationary_beta: 0.20
generative_process_mode: diffusion
flow_source_mode: stationary_anchor
flow_source_hist_blend_rho: 0.0
flow_num_steps: 32
flow_time_schedule: linear
flow_loss_weight: 1.0
trajectory_consistency_mode: none
td_delta_step: 1
td_loss_weight: 0.05
td_weighting_mode: snr
self_condition_mode: none
self_condition_train_prob: 0.0
self_condition_dropout_prob: 0.0
self_condition_noise_std: 0.0
self_condition_fusion_mode: gated_add
use_positive_negative_guidance: false
negative_condition_source: confusing_topk_from_main_ce
negative_condition_topk: 10
png_guidance_scale: 0.0
gal_margin: 0.1
gal_weight: 0.0
split_onebyone: false  # Split sequence one by one
noise_schedule: trunc_lin
beta_a: 0.3 #beta_schedule
beta_b: 10
is_causal: true  # Use causal attention
dif_objective: pred_x0  # Choose diffusion loss objective: 'pred_noise', 'pred_x0', 'pred_v'
parallel_ag: true  # Train in a per token auto-aggressive manner
model: adrec  # Model name:'diffurec','adrec'
independent: true # Independent diffusion, can only work in adrec
pretrained: true  # ADRec baseline effective recipe; choose_model will force this when disable_adrec_pretrained=false
freeze_emb: true  # ADRec baseline effective recipe; choose_model will force this when disable_adrec_pretrained=false
disable_adrec_pretrained: false
embedding_warmup_epochs: 5
cfg_scale: 1
geodesic : false  # Geodesic diffusion,can only use in adrec
loss: mse # Loss function: 'ce', 'mse'
loss_scale: 1.
pcgrad: false
description: _ # Model brief introduction
